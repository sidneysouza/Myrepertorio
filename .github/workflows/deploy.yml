name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Altere para 'master' se sua branch principal tiver esse nome

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # A pasta que o Vite gera
          branch: gh-pages # A branch de destino
